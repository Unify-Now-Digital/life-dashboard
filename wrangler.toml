name = "life-dashboard"
main = "worker/index.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# Build the SPA, then deploy the worker with the built assets bound to it.
[build]
command = "npm run build"

# Static assets (the Vite build output). Unmatched navigations fall back to
# index.html so client-side routes resolve. The worker runs first only for
# /api/* so the serverless endpoints below aren't swallowed by the SPA fallback;
# everything else is served directly from the asset store.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]
